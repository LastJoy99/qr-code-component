<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
  <div class="outer-space">
    <div class="inner-space">
      <div class="qr-code-cont">
        <img src="./images/image-qr-code.png" alt="qr-code">
      </div>
      <h2>Improve your frontend skills by building projects</h2>
      <p>Scan the qr code to visit Frontend Mentor and take your coding skills to next level</p>
    </div>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">LastJoy99</a>.
  </footer>
</body>
</html>
